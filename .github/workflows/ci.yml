name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.41.9"
  # Opt every JavaScript action into Node.js 24 ahead of GitHub's forced
  # rollout (June 2026). Removes the deprecation banner now and avoids
  # surprises when older actions get auto-upgraded.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Analyze + Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Cache pub-cache
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            pub-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-

      - name: Install workspace dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run player_core tests with coverage
        working-directory: player_core
        run: flutter test --coverage

      - name: Run audio_player tests with coverage
        working-directory: audio_player
        run: flutter test --coverage

      - name: Merge coverage reports
        run: |
          # Concatenate per-package lcov files. lcov record blocks are
          # independent so a simple cat is sufficient for downstream tools
          # that aggregate LF/LH counters (the coverage-badge step below).
          mkdir -p coverage
          : > coverage/lcov.info
          for pkg in player_core audio_player; do
            if [ -f "$pkg/coverage/lcov.info" ]; then
              cat "$pkg/coverage/lcov.info" >> coverage/lcov.info
            fi
          done

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: lcov
          path: coverage/lcov.info
          retention-days: 7

  coverage:
    name: Coverage badge
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Declared at job level so linters can resolve ${{ env.COVERAGE_PERCENT }}
      # in the commit step. The actual value is written into GITHUB_ENV by the
      # "Update coverage badge" step.
      COVERAGE_PERCENT: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: lcov
          path: coverage

      - name: Update coverage badge
        run: |
          LCOV_INFO="coverage/lcov.info"

          total_lines=$(grep -o "LF:[0-9]*" "$LCOV_INFO" | cut -d: -f2 | awk '{s+=$1} END {print s}')
          covered_lines=$(grep -o "LH:[0-9]*" "$LCOV_INFO" | cut -d: -f2 | awk '{s+=$1} END {print s}')

          if [ -z "$total_lines" ] || [ "$total_lines" -eq 0 ]; then
            percent=0
          else
            percent=$(awk "BEGIN {printf \"%.1f\", $covered_lines * 100 / $total_lines}")
          fi

          echo "Coverage: $percent%"

          if (( $(echo "$percent < 50" | bc -l) )); then
            color="red"
          elif (( $(echo "$percent < 80" | bc -l) )); then
            color="yellow"
          else
            color="brightgreen"
          fi

          new_badge="![coverage](https://img.shields.io/badge/coverage-${percent}%25-${color})"
          sed -i "s|^!\[coverage\].*|$new_badge|" README.md

          echo "COVERAGE_PERCENT=$percent" >> $GITHUB_ENV

      - name: Commit coverage badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update coverage badge to ${{ env.COVERAGE_PERCENT }}%"
          git push
