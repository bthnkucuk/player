name: audio_player
description: "media_kit-based implementation of the player_core abstraction, with audio_service + audio_session integration for lock-screen controls."
version: 0.8.6
homepage:

publish_to: none

resolution: workspace

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  audio_service: ^0.18.18
  audio_session: ^0.2.3
  flutter:
    sdk: flutter
  rxdart: ^0.28.0
  player_core: ^0.8.4
  # media_kit — tracked against upstream main (no pub.dev release yet for
  # 1.2.6). Switch to a hosted version once 1.2.6+ is tagged.
  media_kit:
    git:
      url: https://github.com/media-kit/media-kit.git
      path: media_kit
      ref: main
  media_kit_libs_audio: ^1.0.7
  meta: any
  equatable: ^2.0.8
  path_provider: ^2.1.5
  synchronized: ^3.4.0

dev_dependencies:
  alchemist: ^0.14.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  leak_tracker_flutter_testing: ^3.0.10
  mocktail: ^1.0.5
  # AudioService.init transitively instantiates DefaultCacheManager → sqflite.
  # sqflite_common_ffi gives the test a pure-Dart SQLite implementation so
  # DefaultCacheManager init completes synchronously without needing the
  # native platform channel.
  sqflite_common_ffi: ^2.4.0+3


